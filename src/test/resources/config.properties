# ═══════════════════════════════════════════════════════════
# GuardianEHR Configuration
# Override any value via: mvn test -Dkey=value
# ═══════════════════════════════════════════════════════════

# Browser: chrome | firefox | edge
browser=chrome

# Headless mode (true for CI/CD, false for local debugging)
headless=false

# Application URLs
base.url=file:///mock-app/index.html
api.base.url=http://localhost:3000

# Retry count for flaky tests (0 = no retries)
retry.count=1
